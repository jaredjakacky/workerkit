name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  verify:
    name: Verify (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        go-version:
          # renovate: datasource=custom.go-supported-floor depName=go-floor versioning=semver-coerced
          - '1.25.x'
          # renovate: datasource=custom.go-supported-latest depName=go-latest versioning=semver-coerced
          - '1.26.x'
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true

      - name: Run full verification suite
        run: make verify

  race:
    name: Race (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        go-version:
          # renovate: datasource=custom.go-supported-floor depName=go-floor versioning=semver-coerced
          - '1.25.x'
          # renovate: datasource=custom.go-supported-latest depName=go-latest versioning=semver-coerced
          - '1.26.x'
    env:
      CGO_ENABLED: '1'
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true

      - name: Run race detector
        run: make test-race

  govulncheck:
    name: govulncheck (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        go-version:
          # renovate: datasource=custom.go-supported-floor depName=go-floor versioning=semver-coerced
          - '1.25.x'
          # renovate: datasource=custom.go-supported-latest depName=go-latest versioning=semver-coerced
          - '1.26.x'
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true

      - name: Run govulncheck
        run: make govulncheck

  release:
    name: release
    runs-on: ubuntu-latest
    needs: [verify, race, govulncheck]
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
